{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page | SGP</title>
</head>
<body>

    <h1>Login Page</h1>

    <form id="loginForm">

        <label for="Username">Username:</label>
        <input
            type="text"
            id="Username"
            name="Username"
            required
        ><br><br>

        <label for="Password">Password:</label>
        <input
            type="password"
            id="Password"
            name="Password"
            required
        ><br><br>

        <a href="{% url 'signup' %}">
            New User? Sign Up here.
        </a>
        <br><br>

        <button type="submit">Login</button>

    </form>

    <script src="{% static 'C:\Users\yugjh\Desktop\SGP-TOKEN\frontend\static\js\login.js' %}"></script>

</body>
</html>
