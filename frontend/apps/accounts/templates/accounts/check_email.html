{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email | AI Token Optimizer</title>
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body data-state="pending" data-redirect="/login/" data-seconds="10">

    <div class="card">

        <div class="token-ring" id="tokenRing">
            <div class="glyph-wrap">
                <div class="pulse-ring"></div>
                <div class="glyph-circle">
                    <svg class="glyph" viewBox="0 0 24 24">
                        <path class="glyph-path" d="M3 6.5h18v11H3z" />
                        <path class="glyph-path" d="M3 6.5l9 7 9-7" />
                    </svg>
                </div>
            </div>
        </div>

        <h1 class="heading">Check your email</h1>
        <p class="subtext">We've sent a verification link to your inbox.<br>Verify your email before logging in.</p>

        <p class="redirect-line">
            Redirecting to login in <span id="countdown">10</span>s
        </p>

        <a class="btn" href="/login/">Go to login</a>

    </div>

    <script src="{% static 'js/auth.js' %}"></script>
</body>
</html>
