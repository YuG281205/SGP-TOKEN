{%load static%}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Page | SGP </title>
    
</head>

<body>
    <h1>Signup Page</h1>
    
    <form id="signupform">
        {% csrf_token %}
        <label for="Username">Username:</label>
        <input type="text" id="Username" name="Username" required><br><br>
        <label for="Email">Email:</label>      
        <input type="email" id="Email" name="Email" required><br><br>
        <label for="Password">Password:</label>
        <input type="password" id="Password" name="Password" required><br><br>
        <label for="CPassword">Confirm Password:</label>
        <input type="password" id="CPassword" name="CPassword" required><br><br>
        <a href="{% url 'login' %}">Already have an account? Login here.</a><br><br>
        <button type="submit">Sign Up</button>
    </form>
    <script src="{% static 'C:\Users\yugjh\Desktop\SGP-TOKEN\frontend\static\js\signup.js' %}"></script>
</body>
</html>
